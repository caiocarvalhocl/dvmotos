services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dvmotos-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dvmotos-network

  # Backend API (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dvmotos-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dvmotos-network
    restart: unless-stopped

  # Frontend (Angular) - Development
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dvmotos-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - dvmotos-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dvmotos-network:
    driver: bridge
