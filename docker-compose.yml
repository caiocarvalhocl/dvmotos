services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dvmotos-db
    environment:
      POSTGRES_DB: dvmotos
      POSTGRES_USER: dvmotos
      POSTGRES_PASSWORD: dvmotos123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvmotos -d dvmotos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dvmotos-network

  # Backend API (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dvmotos-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dvmotos
      DB_USER: dvmotos
      DB_PASSWORD: dvmotos123
      JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZHZtb3Rvcy1hcHBsaWNhdGlvbi0yMDI0
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dvmotos-network
    restart: unless-stopped

  # Frontend (Angular) - Development
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dvmotos-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - dvmotos-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dvmotos-network:
    driver: bridge
