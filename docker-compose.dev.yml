# Use este arquivo para desenvolvimento local
# Execute: docker-compose -f docker-compose.dev.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dvmotos-db
    environment:
      POSTGRES_DB: dvmotos
      POSTGRES_USER: dvmotos
      POSTGRES_PASSWORD: dvmotos123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvmotos -d dvmotos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Interface gráfica para o banco (opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dvmotos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dvmotos.com.br
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
