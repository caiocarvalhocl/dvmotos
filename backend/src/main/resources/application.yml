spring:
  application:
    name: dvmotos-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dvmotos}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 horas em milissegundos
  refresh-expiration: 604800000 # 7 dias

# Initial Admin
admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}

# Logging
logging:
  level:
    com.dvmotos: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Profile: Production
spring:
  config:
    activate:
      on-profile: prod
  
  jpa:
    show-sql: false
  
  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.dvmotos: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
