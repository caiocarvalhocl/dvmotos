<div class="page-container">
  <div class="page-header">
    <div>
      <h1>{{ isEditing() ? "Editar Produto" : "Novo Produto" }}</h1>
      <p class="text-muted">
        {{
          isEditing()
            ? "Atualize os dados do produto"
            : "Cadastre um novo produto no estoque"
        }}
      </p>
    </div>
  </div>

  <div class="card">
    <form (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <app-form-field
          label="Nome"
          inputId="name"
          colClass="form-field span-2"
        >
          <input
            pInputText
            id="name"
            [(ngModel)]="product.name"
            name="name"
            class="w-full"
            placeholder="Nome do produto"
            [disabled]="loading()"
          />
        </app-form-field>

        <app-form-field
          label="Código de Barras"
          inputId="barcode"
          colClass="form-field"
        >
          <input
            pInputText
            id="barcode"
            [(ngModel)]="product.barcode"
            name="barcode"
            class="w-full"
            placeholder="Ex: 7891234567890"
            [disabled]="loading()"
          />
        </app-form-field>

        <app-form-field
          label="Categoria"
          inputId="category"
          colClass="form-field"
        >
          <p-dropdown
            id="category"
            [(ngModel)]="product.categoryId"
            name="categoryId"
            [options]="categories"
            optionLabel="name"
            optionValue="id"
            placeholder="Selecione..."
            [showClear]="true"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-dropdown>
        </app-form-field>

        <app-form-field
          label="Preço de Custo"
          inputId="costPrice"
          colClass="form-field"
        >
          <p-inputNumber
            id="costPrice"
            [(ngModel)]="product.costPrice"
            name="costPrice"
            mode="currency"
            currency="BRL"
            locale="pt-BR"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-inputNumber>
        </app-form-field>

        <app-form-field
          label="Preço de Venda"
          inputId="salePrice"
          colClass="form-field"
        >
          <p-inputNumber
            id="salePrice"
            [(ngModel)]="product.salePrice"
            name="salePrice"
            mode="currency"
            currency="BRL"
            locale="pt-BR"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-inputNumber>
        </app-form-field>

        <app-form-field
          label="Quantidade em Estoque"
          inputId="stockQuantity"
          colClass="form-field"
        >
          <p-inputNumber
            id="stockQuantity"
            [(ngModel)]="product.stockQuantity"
            name="stockQuantity"
            [min]="0"
            styleClass="w-full"
            [disabled]="isEditing() || loading()"
          ></p-inputNumber>
          @if (isEditing()) {
            <small class="text-muted"
              >Use "Movimentar Estoque" para alterar</small
            >
          }
        </app-form-field>

        <app-form-field
          label="Estoque Mínimo"
          inputId="minimumStock"
          colClass="form-field"
        >
          <p-inputNumber
            id="minimumStock"
            [(ngModel)]="product.minimumStock"
            name="minimumStock"
            [min]="0"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-inputNumber>
        </app-form-field>

        <app-form-field label="Unidade" inputId="unit" colClass="form-field">
          <p-dropdown
            id="unit"
            [(ngModel)]="product.unit"
            name="unit"
            [options]="unitOptions"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-dropdown>
        </app-form-field>

        <app-form-field
          label="Descrição"
          inputId="description"
          colClass="form-field span-3"
        >
          <textarea
            pInputTextarea
            id="description"
            [(ngModel)]="product.description"
            name="description"
            rows="3"
            class="w-full"
            placeholder="Descrição do produto (opcional)"
            [disabled]="loading()"
          ></textarea>
        </app-form-field>
      </div>

      <div class="form-actions">
        <button
          pButton
          type="button"
          label="Cancelar"
          class="p-button-text p-button-secondary"
          routerLink="/products"
        ></button>
        <button
          pButton
          type="submit"
          [label]="isEditing() ? 'Atualizar' : 'Salvar'"
          icon="pi pi-check"
          [loading]="saving()"
          [disabled]="loading()"
          class="p-button-success px-4"
        ></button>
      </div>
    </form>
  </div>
</div>
<p-toast></p-toast>
