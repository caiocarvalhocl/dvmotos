<div class="page-container narrow">
  <div class="page-header">
    <div class="header-content">
      <h1>{{ isEditing() ? "Editar Produto" : "Novo Produto" }}</h1>
      <p class="text-muted">
        {{
          isEditing()
            ? "Atualize os dados do produto"
            : "Cadastre um novo produto no estoque"
        }}
      </p>
    </div>
    <button
      pButton
      routerLink="/products"
      icon="pi pi-arrow-left"
      label="Voltar"
      class="p-button-outlined p-button-secondary p-button-sm"
    ></button>
  </div>

  <div class="card form-card">
    <form (ngSubmit)="onSubmit()">
      <h5 class="section-title">
        <i class="pi pi-box"></i> Informações do Produto
      </h5>
      <div class="formgrid grid">
        <app-form-field
          label="Nome"
          inputId="name"
          icon="pi pi-tag"
          [required]="true"
          colClass="col-12 md:col-8"
        >
          <input
            pInputText
            id="name"
            [(ngModel)]="product.name"
            name="name"
            placeholder="Nome do produto"
            [disabled]="loading()"
          />
        </app-form-field>

        <app-form-field
          label="Código de Barras"
          inputId="barcode"
          icon="pi pi-qrcode"
          colClass="col-12 md:col-4"
        >
          <input
            pInputText
            id="barcode"
            [(ngModel)]="product.barcode"
            name="barcode"
            placeholder="Ex: 7891234567890"
            [disabled]="loading()"
          />
        </app-form-field>

        <app-form-field
          label="Categoria"
          inputId="category"
          colClass="md:col-6"
        >
          <p-dropdown
            id="category"
            [(ngModel)]="product.categoryId"
            name="categoryId"
            [options]="categories"
            optionLabel="name"
            optionValue="id"
            placeholder="Selecione..."
            [showClear]="true"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-dropdown>
        </app-form-field>

        <app-form-field label="Unidade" inputId="unit" colClass="md:col-6">
          <p-dropdown
            id="unit"
            [(ngModel)]="product.unit"
            name="unit"
            [options]="unitOptions"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-dropdown>
        </app-form-field>

        <app-form-field
          label="Descrição"
          inputId="description"
          colClass="col-12"
        >
          <textarea
            pInputTextarea
            id="description"
            [(ngModel)]="product.description"
            name="description"
            rows="3"
            placeholder="Descrição do produto (opcional)"
            [disabled]="loading()"
          ></textarea>
        </app-form-field>
      </div>

      <h5 class="section-title"><i class="pi pi-dollar"></i> Preços</h5>
      <div class="formgrid grid">
        <app-form-field
          label="Preço de Custo"
          inputId="costPrice"
          colClass="md:col-6"
        >
          <p-inputNumber
            id="costPrice"
            [(ngModel)]="product.costPrice"
            name="costPrice"
            mode="currency"
            currency="BRL"
            locale="pt-BR"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-inputNumber>
        </app-form-field>

        <app-form-field
          label="Preço de Venda"
          inputId="salePrice"
          icon="pi pi-dollar"
          [required]="true"
          colClass="md:col-6"
        >
          <p-inputNumber
            id="salePrice"
            [(ngModel)]="product.salePrice"
            name="salePrice"
            mode="currency"
            currency="BRL"
            locale="pt-BR"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-inputNumber>
        </app-form-field>
      </div>

      <h5 class="section-title"><i class="pi pi-warehouse"></i> Estoque</h5>
      <div class="formgrid grid">
        <app-form-field
          label="Quantidade em Estoque"
          inputId="stockQuantity"
          colClass="md:col-6"
        >
          <p-inputNumber
            id="stockQuantity"
            [(ngModel)]="product.stockQuantity"
            name="stockQuantity"
            [min]="0"
            styleClass="w-full"
            [disabled]="isEditing() || loading()"
          ></p-inputNumber>
          @if (isEditing()) {
            <small class="text-muted"
              >Use "Movimentar Estoque" para alterar</small
            >
          }
        </app-form-field>

        <app-form-field
          label="Estoque Mínimo"
          inputId="minimumStock"
          colClass="md:col-6"
        >
          <p-inputNumber
            id="minimumStock"
            [(ngModel)]="product.minimumStock"
            name="minimumStock"
            [min]="0"
            styleClass="w-full"
            [disabled]="loading()"
          ></p-inputNumber>
        </app-form-field>
      </div>

      <div class="form-actions">
        <button
          pButton
          type="button"
          label="Cancelar"
          class="p-button-text p-button-secondary"
          routerLink="/products"
        ></button>
        <button
          pButton
          type="submit"
          [label]="isEditing() ? 'Atualizar' : 'Salvar'"
          icon="pi pi-check"
          [loading]="saving()"
          [disabled]="loading()"
          class="p-button-primary px-4"
        ></button>
      </div>
    </form>
  </div>
</div>
<p-toast></p-toast>
