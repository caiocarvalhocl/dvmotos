<div class="page-container">
  <div class="page-header">
    <div>
      <h1>{{ isEditing() ? "Editar Cliente" : "Novo Cliente" }}</h1>
      <p class="text-muted">
        {{
          isEditing()
            ? "Atualize os dados do client"
            : "Preencha os dados do novo client"
        }}
      </p>
    </div>
    <a
      routerLink="/clientes"
      pButton
      icon="pi pi-arrow-left"
      label="Voltar"
      class="p-button-outlined"
    ></a>
  </div>

  <div class="card">
    <form (ngSubmit)="onSubmit()" #form="ngForm">
      <div class="form-grid">
        <!-- Dados Pessoais -->
        <div class="form-section">
          <h3><i class="pi pi-user"></i> Dados Pessoais</h3>

          <div class="form-row">
            <div class="form-group flex-2">
              <label for="nome">Nome *</label>
              <input
                pInputText
                id="nome"
                [(ngModel)]="client.nome"
                name="nome"
                placeholder="Nome completo"
                class="w-full"
                required
              />
            </div>

            <div class="form-group flex-1">
              <label for="cpfCnpj">CPF/CNPJ</label>
              <p-inputMask
                id="cpfCnpj"
                [(ngModel)]="client.cpfCnpj"
                name="cpfCnpj"
                [mask]="cpfCnpjMask"
                placeholder="000.000.000-00"
                styleClass="w-full"
              >
              </p-inputMask>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group flex-1">
              <label for="telefone">Telefone</label>
              <p-inputMask
                id="telefone"
                [(ngModel)]="client.telefone"
                name="telefone"
                mask="(99) 99999-9999"
                placeholder="(00) 00000-0000"
                styleClass="w-full"
              >
              </p-inputMask>
            </div>

            <div class="form-group flex-1">
              <label for="email">E-mail</label>
              <input
                pInputText
                id="email"
                type="email"
                [(ngModel)]="client.email"
                name="email"
                placeholder="email@exemplo.com"
                class="w-full"
              />
            </div>
          </div>
        </div>

        <!-- Endereço -->
        <div class="form-section">
          <h3><i class="pi pi-map-marker"></i> Endereço</h3>

          <div class="form-row">
            <div class="form-group flex-1">
              <label for="cep">CEP</label>
              <p-inputMask
                id="cep"
                [(ngModel)]="client.cep"
                name="cep"
                mask="99999-999"
                placeholder="00000-000"
                styleClass="w-full"
              >
              </p-inputMask>
            </div>

            <div class="form-group flex-3">
              <label for="endereco">Endereço</label>
              <input
                pInputText
                id="endereco"
                [(ngModel)]="client.endereco"
                name="endereco"
                placeholder="Rua, número, bairro"
                class="w-full"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group flex-2">
              <label for="cidade">Cidade</label>
              <input
                pInputText
                id="cidade"
                [(ngModel)]="client.cidade"
                name="cidade"
                placeholder="Cidade"
                class="w-full"
              />
            </div>

            <div class="form-group flex-1">
              <label for="estado">Estado</label>
              <p-dropdown
                id="estado"
                [(ngModel)]="client.estado"
                name="estado"
                [options]="estados"
                optionLabel="label"
                optionValue="value"
                placeholder="UF"
                styleClass="w-full"
              >
              </p-dropdown>
            </div>
          </div>
        </div>

        <!-- Observações -->
        <div class="form-section full-width">
          <h3><i class="pi pi-comment"></i> Observações</h3>

          <div class="form-group">
            <textarea
              pInputTextarea
              id="observacoes"
              [(ngModel)]="client.observacoes"
              name="observacoes"
              [rows]="3"
              placeholder="Observações sobre o client..."
              class="w-full"
            >
            </textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a
          routerLink="/clientes"
          pButton
          label="Cancelar"
          class="p-button-outlined p-button-secondary"
        ></a>
        <button
          pButton
          type="submit"
          [label]="isEditing() ? 'Salvar Alterações' : 'Cadastrar Cliente'"
          icon="pi pi-check"
          [loading]="saving()"
          [disabled]="!form.valid"
        ></button>
      </div>
    </form>
  </div>
</div>

<p-toast></p-toast>
