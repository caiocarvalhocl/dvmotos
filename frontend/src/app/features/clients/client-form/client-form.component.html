<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1>{{ isEditing() ? "Editar Cliente" : "Novo Cliente" }}</h1>
      <p class="text-muted">
        {{
          isEditing()
            ? "Gerencie as informações abaixo"
            : "Cadastre as informações para acesso futuro"
        }}
      </p>
    </div>
    <button
      pButton
      routerLink="/clients"
      icon="pi pi-arrow-left"
      label="Voltar"
      class="p-button-outlined p-button-secondary p-button-sm"
    ></button>
  </div>

  <div class="card form-card">
    <form (ngSubmit)="onSubmit()" #clientForm="ngForm">
      <h5 class="section-title"><i class="pi pi-user"></i> Dados Pessoais</h5>
      <div class="formgrid grid">
        <app-form-field
          label="Nome Completo"
          inputId="name"
          icon="pi pi-user"
          [required]="true"
        >
          <input
            pInputText
            id="name"
            [(ngModel)]="client.name"
            name="name"
            required
            placeholder="Ex: João Silva"
          />
        </app-form-field>

        <app-form-field
          label="CPF/CNPJ"
          inputId="documentNumber"
          icon="pi pi-id-card"
        >
          <p-inputMask
            id="documentNumber"
            [(ngModel)]="client.documentNumber"
            name="documentNumber"
            mask="999.999.999-99"
          />
        </app-form-field>

        <app-form-field label="Email" inputId="email" icon="pi pi-envelope">
          <input
            pInputText
            id="email"
            [(ngModel)]="client.email"
            name="email"
            type="email"
            placeholder="contato@exemplo.com"
          />
        </app-form-field>

        <app-form-field label="Telefone" inputId="phone" icon="pi pi-phone">
          <p-inputMask
            id="phone"
            [(ngModel)]="client.phone"
            name="phone"
            mask="(99) 99999-9999"
            placeholder="(00) 00000-0000"
            styleClass="w-full pl-5"
          ></p-inputMask>
        </app-form-field>

        <app-form-field label="Observações" inputId="notes" colClass="col-12">
          <textarea
            pInputTextarea
            id="notes"
            [(ngModel)]="client.notes"
            name="notes"
            rows="3"
            style="resize: vertical"
          ></textarea>
        </app-form-field>
      </div>

      <h5 class="section-title"><i class="pi pi-map-marker"></i> Endereço</h5>
      <div class="formgrid grid">
        <app-form-field
          label="CEP"
          inputId="zipCode"
          icon="pi pi-search cursor-pointer"
        >
          <p-inputMask
            id="zipCode"
            [(ngModel)]="client.zipCode"
            name="zipCode"
            mask="99999-999"
            placeholder="00000-000"
            styleClass="w-full"
          ></p-inputMask>
        </app-form-field>

        <app-form-field label="Logradouro" inputId="address">
          <input
            pInputText
            id="address"
            [(ngModel)]="client.address"
            name="address"
            placeholder="Rua, Número, Bairro"
            class="w-full"
          />
        </app-form-field>

        <app-form-field label="Cidade" inputId="city" colClass="md:col-3">
          <input
            pInputText
            id="city"
            [(ngModel)]="client.city"
            name="city"
            class="w-full"
          />
        </app-form-field>

        <app-form-field label="Estado" inputId="state" colClass="md:col-3">
          <p-dropdown
            id="state"
            [(ngModel)]="client.state"
            name="state"
            [options]="states"
            placeholder="UF"
            [filter]="true"
            styleClass="w-full"
          ></p-dropdown>
        </app-form-field>
      </div>

      <div class="form-actions">
        <button
          pButton
          type="button"
          label="Cancelar"
          class="p-button-text p-button-secondary"
          routerLink="/clients"
        ></button>
        <button
          pButton
          type="submit"
          label="Salvar Alterações"
          icon="pi pi-check"
          [loading]="saving()"
          [disabled]="!clientForm.valid"
          class="p-button-primary px-4"
        ></button>
      </div>
    </form>
  </div>
</div>
<p-toast></p-toast>
