<div class="page-container wide">
  <div class="page-header">
    <div>
      <h1>Categorias</h1>
      <p class="text-muted">Gerencie as categorias de produtos</p>
    </div>
    <a routerLink="/categories/new" pButton icon="pi pi-plus" class="btn-new">
      <span class="btn-text">Nova Categoria</span>
    </a>
  </div>
  <div class="card">
    <div class="table-header">
      <app-table-filter
        placeholder="Buscar por nome"
        (filterChange)="onFilter($event)"
      ></app-table-filter>
    </div>
    <p-table
      [value]="categories()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="20"
      [totalRecords]="totalRecords()"
      [lazy]="true"
      (onLazyLoad)="loadCategories($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} categorias"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Produtos</th>
          <th>Status</th>
          <th style="width: 120px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-category>
        <tr [class.inactive-row]="!category.active">
          <td>
            <span class="font-bold">{{ category.name }}</span>
          </td>
          <td>{{ category.description || "-" }}</td>
          <td>
            <span class="count-badge badge-warning">{{
              category.totalProducts || 0
            }}</span>
          </td>
          <td>
            <p-tag
              [value]="category.active ? 'Ativo' : 'Inativo'"
              [severity]="category.active ? 'success' : 'danger'"
            ></p-tag>
          </td>
          <td>
            <app-table-actions
              editRoute="/categories/"
              [id]="category.id"
              [isActive]="category.active"
              (onAction)="confirmToggleStatus(category)"
            ></app-table-actions>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center">
            <div class="empty-state">
              <i class="pi pi-tags"></i>
              <p>Nenhuma categoria encontrada</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
