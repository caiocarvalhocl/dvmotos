<div class="page-container narrow">
  <div class="page-header">
    <div class="header-content">
      <h1>{{ isEditing() ? "Editar Categoria" : "Nova Categoria" }}</h1>
      <p class="text-muted">
        {{
          isEditing()
            ? "Atualize os dados da categoria"
            : "Cadastre uma nova categoria de produtos"
        }}
      </p>
    </div>

    <button
      pButton
      routerLink="/categories"
      icon="pi pi-arrow-left"
      label="Voltar"
      class="p-button-outlined p-button-secondary p-button-sm"
    ></button>
  </div>

  <div class="card form-card">
    <form (ngSubmit)="onSubmit()" #categoryForm="ngForm">
      <h5 class="section-title"><i class="pi pi-tag"></i> Dados da Categoria</h5>
      <div class="formgrid grid">
        <app-form-field
          label="Nome"
          inputId="name"
          icon="pi pi-tag"
          [required]="true"
          colClass="col-12"
        >
          <input
            pInputText
            id="name"
            [(ngModel)]="category.name"
            name="name"
            required
            placeholder="Nome da categoria"
            [disabled]="loading()"
          />
        </app-form-field>

        <app-form-field
          label="Descrição"
          inputId="description"
          colClass="col-12"
        >
          <textarea
            pInputTextarea
            id="description"
            [(ngModel)]="category.description"
            name="description"
            rows="3"
            placeholder="Descrição da categoria (opcional)"
            [disabled]="loading()"
          ></textarea>
        </app-form-field>
      </div>

      <div class="form-actions">
        <button
          pButton
          type="button"
          label="Cancelar"
          class="p-button-text p-button-secondary"
          routerLink="/categories"
        ></button>
        <button
          pButton
          type="submit"
          [label]="isEditing() ? 'Atualizar' : 'Salvar'"
          icon="pi pi-check"
          [loading]="saving()"
          [disabled]="loading() || !categoryForm.valid"
          class="p-button-primary px-4"
        ></button>
      </div>
    </form>
  </div>
</div>
<p-toast></p-toast>
