<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1>Meu Perfil</h1>
      <p class="text-muted">Gerencie suas informações pessoais e segurança</p>
    </div>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <div class="flex flex-column align-items-center gap-3">
        <i
          class="pi pi-spin pi-spinner text-primary"
          style="font-size: 2.5rem"
        ></i>
        <span class="text-muted">Carregando perfil...</span>
      </div>
    </div>
  } @else {
    <div class="profile-grid">
      <div class="card form-card">
        <div class="profile-avatar-section">
          <div class="avatar-circle">
            {{ getUserInitials() }}
          </div>
          <h2 class="mb-1 mt-3 font-bold">{{ user.name }}</h2>
          <p-tag
            [value]="getRoleLabel(user.role)"
            [severity]="getRoleSeverity(user.role)"
            styleClass="px-3"
          ></p-tag>
        </div>

        <form (ngSubmit)="onSaveProfile()" #profileForm="ngForm">
          <h5 class="section-title">
            <i class="pi pi-id-card"></i> Dados Básicos
          </h5>
          <div class="formgrid grid">
            <app-form-field
              label="Nome Completo"
              inputId="name"
              icon="pi pi-user"
              [required]="true"
              colClass="col-12"
            >
              <input
                pInputText
                id="name"
                [(ngModel)]="user.name"
                name="name"
                required
                placeholder="Seu nome completo"
              />
            </app-form-field>

            <app-form-field
              label="Email"
              inputId="email"
              icon="pi pi-envelope"
              [required]="true"
              colClass="col-12"
            >
              <input
                pInputText
                id="email"
                [(ngModel)]="user.email"
                name="email"
                type="email"
                required
                placeholder="seu@email.com"
              />
            </app-form-field>
          </div>

          <div class="form-actions">
            <button
              pButton
              type="submit"
              label="Salvar Dados"
              icon="pi pi-check"
              class="p-button-primary w-full"
              [loading]="savingProfile()"
              [disabled]="!profileForm.valid"
            ></button>
          </div>
        </form>
      </div>

      <div class="card form-card">
        <form (ngSubmit)="onChangePassword()" #passwordForm="ngForm">
          <h5 class="section-title">
            <i class="pi pi-shield"></i> Alterar Senha
          </h5>
          <p class="text-muted mb-3">
            Para sua segurança, utilize uma senha forte com caracteres especiais
            e números.
          </p>

          <div class="formgrid grid">
            <app-form-field
              label="Senha Atual"
              inputId="currentPassword"
              icon="pi pi-lock"
              [required]="true"
              colClass="col-12"
            >
              <p-password
                id="currentPassword"
                [(ngModel)]="currentPassword"
                name="currentPassword"
                [toggleMask]="true"
                [feedback]="false"
                placeholder="••••••••"
                styleClass="w-full"
                required
              ></p-password>
            </app-form-field>
          </div>

          <p-divider align="center">
            <span class="text-muted">Nova Senha</span>
          </p-divider>

          <div class="formgrid grid">
            <app-form-field
              label="Nova Senha"
              inputId="newPassword"
              icon="pi pi-key"
              [required]="true"
              colClass="col-12"
            >
              <p-password
                id="newPassword"
                [(ngModel)]="newPassword"
                name="newPassword"
                [toggleMask]="true"
                [feedback]="true"
                placeholder="Mínimo 6 caracteres"
                styleClass="w-full"
                weakLabel="Fraca"
                mediumLabel="Média"
                strongLabel="Forte"
                required
                minlength="6"
              ></p-password>
            </app-form-field>

            <app-form-field
              label="Confirmar Nova Senha"
              inputId="confirmPassword"
              icon="pi pi-check-circle"
              [required]="true"
              colClass="col-12"
            >
              <p-password
                id="confirmPassword"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                [toggleMask]="true"
                [feedback]="false"
                placeholder="Repita a nova senha"
                styleClass="w-full"
                required
              ></p-password>
            </app-form-field>
          </div>

          <div class="form-actions">
            <button
              pButton
              type="submit"
              label="Atualizar Senha"
              icon="pi pi-lock"
              [loading]="savingPassword()"
              class="p-button-outlined p-button-warning w-full"
              [disabled]="!passwordForm.valid"
            ></button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
<p-toast></p-toast>
