<div class="page-container wide">
  <div class="page-header">
    <div>
      <h1>Usuários</h1>
      <p class="text-muted">Gerencie os usuários do sistema</p>
    </div>
    <a routerLink="/users/new" pButton icon="pi pi-plus" class="btn-new">
      <span class="btn-text">Cadastrar Usuário</span>
    </a>
  </div>
  <div class="card">
    <div class="table-header">
      <app-table-filter
        placeholder="Buscar por nome ou email..."
        (filterChange)="onFilter($event)"
      ></app-table-filter>
    </div>
    <p-table
      [value]="users()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="20"
      [totalRecords]="totalRecords()"
      [lazy]="true"
      (onLazyLoad)="loadUsers($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} usuários"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header"
        ><tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Perfil</th>
          <th>Status</th>
          <th style="width: 120px">Ações</th>
        </tr></ng-template
      >
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <span class="font-bold">{{ user.name }}</span>
          </td>
          <td>{{ user.email }}</td>
          <td>
            <p-tag
              [value]="getRoleLabel(user.role)"
              [severity]="getRoleSeverity(user.role)"
            ></p-tag>
          </td>
          <td>
            <p-tag
              [value]="user.active ? 'Ativo' : 'Inativo'"
              [severity]="user.active ? 'success' : 'danger'"
            ></p-tag>
          </td>
          <td>
            <app-table-actions
              editRoute="/users"
              [id]="user.id"
              [isActive]="user.active"
              (onAction)="confirmToggleStatus(user)"
            ></app-table-actions>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage"
        ><tr>
          <td colspan="5" class="text-center">
            <div class="empty-state">
              <i class="pi pi-users"></i>
              <p>Nenhum usuário encontrado</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
