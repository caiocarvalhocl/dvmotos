<div class="page-container">
  <div class="page-header">
    <div><h1>Veículos</h1><p class="text-muted">Gerencie os veículos da oficina</p></div>
    <a routerLink="/vehicles/new" pButton icon="pi pi-plus" label="Novo Veículo"></a>
  </div>
  <div class="card">
    <div class="table-header">
      <span class="p-input-icon-left"><i class="pi pi-search"></i>
        <input pInputText [(ngModel)]="searchTerm" (ngModelChange)="onSearch($event)" placeholder="Buscar por placa, marca ou modelo..." class="search-input"/>
      </span>
    </div>
    <p-table [value]="vehicles()" [loading]="loading()" [paginator]="true" [rows]="20" [totalRecords]="totalRecords()" [lazy]="true" (onLazyLoad)="loadVehicles($event)" [showCurrentPageReport]="true" currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} veículos" styleClass="p-datatable-sm">
      <ng-template pTemplate="header"><tr><th>Placa</th><th>Marca/Modelo</th><th>Ano</th><th>Cor</th><th>Cliente</th><th>Status</th><th style="width: 120px">Ações</th></tr></ng-template>
      <ng-template pTemplate="body" let-vehicle>
        <tr>
          <td><span class="font-bold">{{ vehicle.licensePlate }}</span></td>
          <td>{{ vehicle.brand }} {{ vehicle.model }}</td>
          <td>{{ vehicle.year || "-" }}</td>
          <td>{{ vehicle.color || "-" }}</td>
          <td>{{ vehicle.clientName }}</td>
          <td><p-tag [value]="vehicle.active ? 'Ativo' : 'Inativo'" [severity]="vehicle.active ? 'success' : 'danger'"></p-tag></td>
          <td><div class="action-buttons"><a [routerLink]="['/vehicles', vehicle.id]" pButton icon="pi pi-pencil" class="p-button-text p-button-sm"></a><button pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="confirmDelete(vehicle)"></button></div></td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage"><tr><td colspan="7" class="text-center"><div class="empty-state"><i class="pi pi-car"></i><p>Nenhum veículo encontrado</p><a routerLink="/vehicles/new" pButton label="Cadastrar primeiro veículo" icon="pi pi-plus" class="p-button-outlined"></a></div></td></tr></ng-template>
    </p-table>
  </div>
</div>
<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
