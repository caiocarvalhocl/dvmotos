<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1>{{ isEditing() ? "Editar Veículo" : "Novo Veículo" }}</h1>
      <p class="text-muted">
        {{
          isEditing()
            ? "Gerencie os dados do veículo abaixo"
            : "Cadastre um novo veículo na frota"
        }}
      </p>
    </div>
    <button
      pButton
      routerLink="/vehicles"
      icon="pi pi-arrow-left"
      label="Voltar"
      class="p-button-outlined p-button-secondary p-button-sm"
    ></button>
  </div>

  <div class="card form-card">
    <form (ngSubmit)="onSubmit()" #vehicleForm="ngForm">
      <h5 class="section-title"><i class="pi pi-user"></i> Proprietário</h5>
      <div class="formgrid grid">
        <div class="field col-12">
          <label for="client"
            >Cliente Responsável <span class="text-red-500">*</span></label
          >
          <span class="p-input-icon-left w-full">
            <i class="pi pi-search"></i>
            <p-autoComplete
              id="client"
              [(ngModel)]="selectedClient"
              name="client"
              [suggestions]="filteredClients"
              (completeMethod)="filterClients($event)"
              (onSelect)="onClientSelect($event)"
              field="name"
              [dropdown]="true"
              placeholder="Digite para buscar o cliente..."
              styleClass="w-full"
              inputStyleClass="w-full pl-5"
              required
            ></p-autoComplete>
          </span>
        </div>
      </div>

      <h5 class="section-title"><i class="pi pi-car"></i> Identificação</h5>
      <div class="formgrid grid">
        <div class="field col-12 md:col-4">
          <label for="licensePlate"
            >Placa <span class="text-red-500">*</span></label
          >
          <span class="p-input-icon-left w-full">
            <i class="pi pi-id-card"></i>
            <input
              pInputText
              id="licensePlate"
              [(ngModel)]="vehicle.licensePlate"
              name="licensePlate"
              required
              placeholder="ABC-1234"
              class="w-full font-bold uppercase"
              style="letter-spacing: 1px"
            />
          </span>
        </div>

        <div class="field col-12 md:col-4">
          <label for="brand">Marca <span class="text-red-500">*</span></label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-tag"></i>
            <input
              pInputText
              id="brand"
              [(ngModel)]="vehicle.brand"
              name="brand"
              required
              placeholder="Ex: Toyota"
              class="w-full"
            />
          </span>
        </div>

        <div class="field col-12 md:col-4">
          <label for="model">Modelo <span class="text-red-500">*</span></label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-info-circle"></i>
            <input
              pInputText
              id="model"
              [(ngModel)]="vehicle.model"
              name="model"
              required
              placeholder="Ex: Corolla XEi"
              class="w-full"
            />
          </span>
        </div>
      </div>

      <div class="formgrid grid mt-2">
        <div class="field col-12 md:col-3">
          <label for="year">Ano</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-calendar"></i>
            <input
              pInputText
              id="year"
              [(ngModel)]="vehicle.year"
              name="year"
              maxlength="4"
              placeholder="Ex: 2023"
            />
          </span>
        </div>

        <div class="field col-12 md:col-3">
          <label for="color">Cor</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-palette"></i>
            <input
              pInputText
              id="color"
              [(ngModel)]="vehicle.color"
              name="color"
              placeholder="Ex: Prata"
              class="w-full"
            />
          </span>
        </div>

        <div class="field col-12 md:col-3">
          <label for="chassisNumber">Chassi</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-bars"></i>
            <input
              pInputText
              id="chassisNumber"
              [(ngModel)]="vehicle.chassisNumber"
              name="chassisNumber"
              placeholder="Opcional"
              class="w-full"
            />
          </span>
        </div>

        <div class="field col-12 md:col-3">
          <label for="currentMileage">KM Atual</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-compass" style="z-index: 2"></i>
            <p-inputNumber
              id="currentMileage"
              [(ngModel)]="vehicle.currentMileage"
              name="currentMileage"
              [useGrouping]="true"
              placeholder="0"
              styleClass="w-full"
              inputStyleClass="w-full pl-5"
            ></p-inputNumber>
          </span>
        </div>
      </div>

      <div class="field mt-3">
        <label for="notes">Observações</label>
        <textarea
          pInputTextarea
          id="notes"
          [(ngModel)]="vehicle.notes"
          name="notes"
          rows="3"
          placeholder="Avarias, detalhes especiais..."
          class="w-full"
        ></textarea>
      </div>

      <div class="form-actions">
        <button
          pButton
          type="button"
          label="Cancelar"
          class="p-button-text p-button-secondary"
          routerLink="/vehicles"
        ></button>
        <button
          pButton
          type="submit"
          label="Salvar Veículo"
          icon="pi pi-check"
          [loading]="saving()"
          [disabled]="!vehicleForm.valid"
          class="p-button-success px-4"
        ></button>
      </div>
    </form>
  </div>
</div>
<p-toast></p-toast>
